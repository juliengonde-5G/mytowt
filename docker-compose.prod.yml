version: "3.8"

services:
  # ─── PostgreSQL Database ────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: towt-db
    network_mode: host
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-towt_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-towt_planning}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-towt_admin} -h 127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── FastAPI Application ────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: towt-app
    network_mode: host
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-towt_admin}:${POSTGRES_PASSWORD}@127.0.0.1:5432/${POSTGRES_DB:-towt_planning}
      - SECRET_KEY=${SECRET_KEY}
      - APP_ENV=production
      - DEBUG=false
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ─── Nginx Reverse Proxy ───────────────────────────
  nginx:
    image: nginx:alpine
    container_name: towt-nginx
    network_mode: host
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  postgres_data:
