<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my_TOWT - Connexion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --towt-blue: #095561;
            --towt-blue-dark: #073d46;
            --towt-green: #87BD2B;
            --towt-green-light: #BEDB92;
            --towt-sky: #9EC6D2;
            --towt-gray: #393939;
            --towt-light: #F2F6F7;
            --towt-warm: #FAF7F2;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--towt-blue) 0%, var(--towt-blue-dark) 50%, #042a30 100%);
            position: relative;
            overflow: hidden;
        }
        
        /* Subtle wave decoration */
        body::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40%;
            background: linear-gradient(180deg, transparent, rgba(135, 189, 43, 0.05));
            pointer-events: none;
        }
        
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            z-index: 1;
        }
        
        .login-card {
            background: rgba(255, 255, 255, 0.97);
            border-radius: 16px;
            padding: 48px 40px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
        }
        
        .login-logo {
            text-align: center;
            margin-bottom: 12px;
        }
        
        .login-logo img {
            height: 70px;
            filter: brightness(0);
        }
        
        .login-subtitle {
            text-align: center;
            color: var(--towt-blue);
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 36px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--towt-gray);
            margin-bottom: 6px;
        }
        
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            color: var(--towt-gray);
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }
        
        .form-input:focus {
            border-color: var(--towt-blue);
            box-shadow: 0 0 0 3px rgba(9, 85, 97, 0.1);
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--towt-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 8px;
        }
        
        .btn-login:hover {
            background: var(--towt-blue-dark);
        }
        
        .btn-login:active {
            transform: scale(0.98);
        }
        
        .error-message {
            background: #fef2f2;
            color: #dc2626;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            border-left: 3px solid #dc2626;
        }
        
        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <img src="/static/img/logo_mytowt_white.svg" alt="my_TOWT" style="height:50px;">
            </div>
            <div class="login-subtitle">Planning & Opérations</div>
            
            {% if error %}
            <div class="error-message">{{ error }}</div>
            {% endif %}
            
            <form method="POST" action="/login">
                <div class="form-group">
                    <label class="form-label" for="username">Identifiant</label>
                    <input type="text" id="username" name="username" class="form-input" 
                           placeholder="Votre identifiant" required autocomplete="username" autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Mot de passe</label>
                    <input type="password" id="password" name="password" class="form-input" 
                           placeholder="Votre mot de passe" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-login">Se connecter</button>
            </form>
        </div>
        <div class="login-footer">
            TOWT — Transport à la voile · v2.0
        </div>
    </div>
</body>
</html>
