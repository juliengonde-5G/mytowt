<div class="modal-overlay" onclick="if(event.target===this) closeModal()">
    <div class="modal" style="max-width:500px;">
        <div class="modal-header">
            <h3>Configuration — {{ port.locode }}</h3>
            <span style="font-size:12px;color:#888;">{{ port.name }} ({{ port.country_code }})</span>
            <button class="modal-close" onclick="closeModal()"><i data-lucide="x"></i></button>
        </div>
        <form method="POST" id="port-config-form" action="/finance/ports/{{ port.locode }}/edit">
            <div class="modal-body">
                <div class="form-group" style="display:flex;align-items:center;gap:10px;">
                    <input type="checkbox" name="accessible" id="acc_cb"
                           {% if not config or config.accessible %}checked{% endif %}>
                    <label for="acc_cb" class="form-label" style="margin:0;">Port accessible (tirant d'eau / tirant d'air OK)</label>
                </div>
                <div class="form-group">
                    <label class="form-label">Coût portuaire total (€)</label>
                    <input type="text" name="port_cost_total" class="form-input" style="text-align:right;"
                           value="{{ config.port_cost_total if config and config.port_cost_total else '0' }}">
                    <span style="font-size:10px;color:#aaa;">Pilotage, remorquage, lamanage, droits de port</span>
                </div>
                <div class="form-group">
                    <label class="form-label">Coût journalier à quai (€/jour)</label>
                    <input type="text" name="daily_quay_cost" class="form-input" style="text-align:right;"
                           value="{{ config.daily_quay_cost if config and config.daily_quay_cost else '0' }}">
                    <span style="font-size:10px;color:#aaa;">Multiplié par le nombre de jours d'escale</span>
                </div>
                <div class="form-group">
                    <label class="form-label">Coût moyen par palette (€)</label>
                    <input type="text" name="cost_per_palette" class="form-input" style="text-align:right;"
                           value="{{ config.cost_per_palette if config and config.cost_per_palette else '0' }}">
                    <span style="font-size:10px;color:#aaa;">Manutention docker par palette</span>
                </div>
                <div class="form-group">
                    <label class="form-label">Notes</label>
                    <textarea name="notes" class="form-input" rows="2">{{ config.notes if config and config.notes else '' }}</textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal()">Annuler</button>
                <button type="submit" class="btn btn-primary"><i data-lucide="check"></i> Enregistrer</button>
            </div>
        </form>
    </div>
</div>
