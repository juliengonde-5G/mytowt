<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOWT - Accès non autorisé</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f7fa;display:flex;align-items:center;justify-content:center;min-height:100vh;color:#333}
        .container{text-align:center;background:white;border-radius:16px;padding:48px 40px;box-shadow:0 4px 24px rgba(0,0,0,0.08);max-width:480px}
        .icon{font-size:64px;margin-bottom:16px}
        h1{font-size:22px;margin-bottom:8px;color:#095561}
        p{color:#666;margin-bottom:24px;font-size:14px;line-height:1.5}
        .btn{display:inline-block;padding:10px 24px;background:#095561;color:white;text-decoration:none;border-radius:8px;font-size:14px;font-weight:500}
        .btn:hover{background:#0a6b79}
        .code{font-size:80px;font-weight:800;color:#e5e7eb;margin-bottom:8px}
    </style>
</head>
<body>
    <div class="container">
        <div class="code">403</div>
        <div class="icon">🔒</div>
        <h1>Accès non autorisé</h1>
        <p>Vous n'avez pas les permissions nécessaires pour accéder à cette page. Contactez votre administrateur si vous pensez qu'il s'agit d'une erreur.</p>
        <a href="/" class="btn">← Retour au tableau de bord</a>
    </div>
</body>
</html>
