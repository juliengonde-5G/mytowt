[alembic]
# Path to migration scripts
script_location = migrations

# Template for new migration filenames
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# Timezone for file_template timestamps
timezone = UTC

# Prepend the project root to sys.path so migrations can ``import app.*``.
prepend_sys_path = .

# SQLAlchemy URL — read by migrations/env.py from the app settings.
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# Nothing configured yet.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
